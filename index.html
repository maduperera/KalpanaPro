<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vijñāna AI | Kalpanā Edge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="kalpana-core.js"></script>
    <style>
        .loader { border-top-color: #38bdf8; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 p-8">
    <div class="max-w-2xl mx-auto space-y-4">
        <h1 class="text-3xl font-bold">Vijñāna AI</h1>
        
        <div id="retrieval-status" class="hidden flex items-center space-x-3 bg-slate-800 p-3 rounded-lg border border-sky-500/30">
            <div class="loader ease-linear rounded-full border-2 border-t-2 border-slate-700 h-5 w-5"></div>
            <span class="text-sky-400 text-sm font-medium animate-pulse">Reranking & Generating Answer...</span>
        </div>

        <div id="response" class="p-6 bg-slate-800 rounded-xl border border-white/10 min-h-[100px] whitespace-pre-wrap"></div>
        <input type="text" id="query-input" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-sky-500" placeholder="Ask about Sally...">
        <button id="btn-send" class="px-6 py-2 bg-sky-600 rounded-lg font-bold">Retrieve</button>
    </div>

    <script type="module">
        // ... (standard initialization)

        async function handleQuery() {
            const q = document.getElementById('query-input').value;
            const status = document.getElementById('retrieval-status');
            const responseNode = document.getElementById('response');
            
            status.classList.remove('hidden'); // Show spinner
            responseNode.innerText = "Accessing Kalpanā State...";

            try {
                // 1. EMBED & RETRIEVE (Kalpanā Hybrid Logic)
                const qOut = await extractor(q, { pooling: 'mean', normalize: true });
                const scored = documentChunks.map(c => {
                    const rifVec = kalpanaState.readDirect(c.id);
                    return { ...c, score: window.cosineSimilarity(qOut.data, rifVec) };
                }).sort((a,b) => b.score - a.score);

                // 2. COMPREHENSIVE GENERATION
                const reply = await llmEngine.chat.completions.create({
                    messages: [
                        { role: "system", content: "You are an expert researcher. Provide a comprehensive answer based ONLY on the context. Include names, relationships, and key events." },
                        { role: "user", content: `<CONTEXT>${scored.slice(0,4).map(s=>s.text).join("\n")}</CONTEXT>\nQuestion: ${q}` }
                    ],
                    max_tokens: 250
                });

                status.classList.add('hidden'); // Hide spinner
                responseNode.innerText = reply.choices[0].message.content;

            } catch (err) {
                status.classList.add('hidden');
                responseNode.innerText = "Error: " + err.message;
            }
        }
        // ... (rest of logic)
    </script>
</body>
</html>
